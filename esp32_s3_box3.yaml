            it.printf(col1_x, row2_y, id(icon_font_55), on_color,  TextAlign::CENTER, "\U000F06E8");
          } else {
            it.printf(col1_x, row2_y, id(icon_font_55), off_color, TextAlign::CENTER, "\U000F0335");
          }
          it.printf(col1_x, row2_y + icon_size/2 + 10, id(font_request), Color::BLACK, TextAlign::CENTER, "All light");

          // --- Light 4 - bottom-middle (bulb icon) ---
          if (id(light4_state).state) {
            it.printf(col2_x, row2_y, id(icon_font_55), on_color,  TextAlign::CENTER, "\U000F06E8");
          } else {
            it.printf(col2_x, row2_y, id(icon_font_55), off_color, TextAlign::CENTER, "\U000F0335");
          }
          it.printf(col2_x, row2_y + icon_size/2 + 10, id(font_request), Color::BLACK, TextAlign::CENTER, "Rumpus");
          
          // --- Light 5 - top-right (bulb icon) ---
          if (id(light5_state).state) {
            it.printf(col3_x, row1_y, id(icon_font_55), on_color,  TextAlign::CENTER, "\U000F06E8");
          } else {
            it.printf(col3_x, row1_y, id(icon_font_55), off_color, TextAlign::CENTER, "\U000F0335");
          }
          it.printf(col3_x, row1_y + icon_size/2 + 10, id(font_request), Color::BLACK, TextAlign::CENTER, "Bed Lamp1");

