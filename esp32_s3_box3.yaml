esphome:
  name: esp32-s3-box-3b-v17
  friendly_name: ESP32 S3 Box 3b v17
  on_boot:
    priority: 600
    then:
      - script.execute: draw_display
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display
      - homeassistant.action:
          action: homeassistant.update_entity
          data:
            entity_id: media_player.${external_media_player}
      - delay: 1s
      ##Initialize volume from HA API - 
      - lambda: |-
          //Ext player variable init
          if (id(ha_media_volume).has_state()) {
            float vol = std::stof(id(ha_media_volume).state);
            vol = roundf(vol * 100.0f) / 100.0f;
            id(volume_value) = vol;
            const int bar_x1 = ${bar_x1};
            const int bar_w  = ${bar_w};
            id(last_touch_x) = bar_x1 + (vol * bar_w);

            ESP_LOGD("main", "On Boot - synced volume from HA: %.2f", vol);
          } else {
            ESP_LOGW("main", "No initial HA volume available on boot");
          }

      - component.update: s3_box_lcd

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
    advanced:
      #Added for optimization
      execute_from_psram: "true"
      compiler_optimization: "PERF"
psram:
  mode: octal
  speed: 80MHz
# Enable Home Assistant API
api:
  encryption:
    key: "2RjZiRnfEH9jTZ7erINTEEgXHBnkwlEnsViXPfUWVp0="
  on_client_connected:
    - script.execute: draw_display
    - lambda: |-
        id(api_connection) = true;
    - component.update: s3_box_lcd

  on_client_disconnected:
    - script.execute: draw_display
    - lambda: |-
        id(api_connection) = false;
    - component.update: s3_box_lcd
ota:
  - platform: esphome
    password: "d8ff4b288fc4414f9c83ae58bc20b857"
# Enable logging
logger:
  level: DEBUG
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-S3-Box-3B-v17"
    password: "wifi12345"
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

#interval:
#  - interval: 125ms
#    then:
http_request:
  verify_ssl: 'false'
  buffer_size_tx: 1024
  buffer_size_rx: 1024

interval:
  - interval: 7s     # scroll for text_response
    then:
      - lambda: |-
          id(resp_line_offset) += 2;    // one line per step; use += 3 for page jumps
          id(s3_box_lcd).update();
  ##weather API
  - interval: 3min
    then:
      - http_request.get:
          url: "http://api.open-meteo.com/v1/forecast?latitude=-37.81&longitude=144.96&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=1&timezone=Australia%2FSydney"
         #url: https://api.melbournecityit.com.au/auweather
          capture_response: true
          on_response:
            then:
              - logger.log:
                  format: "HTTP connection established. Status code: %d"
                  args: [ 'response->status_code' ]

              # Show raw response body
              #- logger.log:
              #    format: "API weather Raw response: %s"
              #    args: [ 'body.c_str()' ]
              - if:
                  condition:
                    lambda: 'return response->status_code == 200;'

                  then:
                    - lambda: |-

                        ESP_LOGI("weather", "Parsing JSON ...");

                        DynamicJsonDocument doc(1024);
                        auto error = deserializeJson(doc, body);

                        if (error) {
                          ESP_LOGE("weather",
                            "JSON parse failed: %s",
                            error.c_str());
                          return;
                        }

                        JsonObject daily = doc["daily"];

                        if (daily.isNull()) {
                          ESP_LOGE("weather",
                            "'daily' section not found");
                          return;
                        }

                        // Extract weather_code
                        // int weather = daily["weather_code"][0];

                          int code = daily["weather_code"][0].as<int>();
                          std::string condition;
                          if (code == 0 || code == 1) {
                            condition = "Sunny";
                          } else if (code == 2 || code == 3) {
                            condition = "Cloudy";
                          } else if (code >= 51 && code <= 67) {
                            condition = "Rainy";
                          } else if (code >= 71 && code <= 77) {
                            condition = "Cold Rain";
                          } else if (code >= 80 && code <= 82) {
                            condition = "Rainy";
                          } else if (code >= 95) {
                            condition = "Stormy";
                          } else {
                            condition = "Cloudy";
                          }
                        id(api_weather_state).publish_state(condition);
                        //ESP_LOGI("weather", "Weather code: %d", weather);

                        //Extract max temp
                        float temp_max = daily["temperature_2m_max"][0];

                        ESP_LOGI("weather",
                          "Max temp: %.1f",
                          temp_max);

                        id(temperature_max)
                          ->publish_state(temp_max);

                        //Extract min temp

                        float temp_min =
                          daily["temperature_2m_min"][0];

                        ESP_LOGI("weather",
                          "Min temp: %.1f",
                          temp_min);

                        id(temperature_min)
                          ->publish_state(temp_min);

                  else:
                    - logger.log:
                        format: "HTTP Error: %d"
                        args: [ 'response->status_code' ]

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

  - platform: ledc
    id: out_led_red
    pin: GPIO39         # PMOD Red
    frequency: 1000 Hz  # smooth enough for LEDs

  - platform: ledc
    id: out_led_green
    pin: GPIO40         # PMOD Green
    frequency: 1000 Hz

  - platform: ledc
    id: out_led_blue
    pin: GPIO41         # PMOD Blue
    frequency: 1000 Hz

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    internal: True
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

  - platform: rgb
    id: status_led
    name: "PMOD Status LED"
    icon: "mdi:led-on"
    red: out_led_red
    green: out_led_green
    blue: out_led_blue
    default_transition_length: 200ms
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 380ms
          update_interval: 380ms
          min_brightness: 40%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 130ms
          update_interval: 130ms
          min_brightness: 50%
          max_brightness: 80%
      - strobe:
          name: "Strobe Effect"
          colors:
            - state: true
              brightness: 100%
              red: 0%
              green: 0%
              blue: 100%
              duration: 500ms
              transition_length: 300ms
            - state: false
              duration: 200ms
              transition_length: 300ms
            - state: true
              brightness: 100%
              red: 0%
              green: 100%
              blue: 0%
              duration: 500ms
              transition_length: 300ms
i2c:
  - id: i2c_adc_dac
    scl: GPIO18
    sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    i2c_id: i2c_adc_dac
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    i2c_id: i2c_adc_dac
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external


speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 100ms
  
media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    volume_min: 0.3
    volume_max: 0.9
    volume_initial: 0.75
    task_stack_in_psram: true
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac

    on_announcement:
      # Stop the wake word (mWW or VA) if the mic is capturing
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            # Ensure VA stops before moving on
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            and:
              - media_player.is_announcing:
              - not:
                  voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # Since VA isn't running, this is the end of user-intiated media playback. Restart the wake word.
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: return !id(local_volume_adjusting);
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

micro_wake_word:
  id: mww
  models:
    - hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 3.5
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - light.turn_on:
        id: led
        brightness: !lambda 'return id(screen_brightness_value);'
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
    - light.turn_on:
        id: status_led
        # Purple = Red + Blue, no Green
        red: 10%
        green: 0%
        blue: 100%
        brightness: 60% 
        effect: "Strobe Effect"
    
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
    - light.turn_on:
        id: status_led
        blue: 100%
        red: 0%
        green: 85%
        effect: "Fast Pulse"
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: draw_display

    - light.turn_on:
        id: status_led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: "Slow Pulse"
  on_end:
    # Wait a short amount of time to see if an announcement starts
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 1s
    # Announcement is finished and the I2S bus is free
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    # Restart only mWW if enabled; streaming wake words automatically restart
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    # Clear text sensors
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""
    - light.turn_off:
        id: status_led
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  #timer
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
    - light.turn_off: status_led
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display
    - light.turn_on:
        id: status_led
        blue: 0%
        red: 100%
        green: 50%
        brightness: 100%
        effect: "Slow Pulse"
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - display.page.show: timer_finished_page
    - component.update: s3_box_lcd
    #original setting.
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display
    - light.turn_on:
        id: status_led
        blue: 100%
        red: 100%
        green: 0%
        effect: "Fast Pulse"

script:
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_listening_phase_id}:
                                id(s3_box_lcd).show_page(listening_page);
                                id(led).turn_on();
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(s3_box_lcd).show_page(thinking_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(s3_box_lcd).show_page(replying_page);
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(s3_box_lcd).show_page(error_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(s3_box_lcd).show_page(muted_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(s3_box_lcd).show_page(no_ha_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_timer_finished_phase_id}:
                                id(s3_box_lcd).show_page(timer_finished_page);
                                id(s3_box_lcd).update();
                                break;
                              default:
                                // Only switch to idle page if not adjusting volume locally
                                if (!id(local_volume_adjusting)) {
                                    id(s3_box_lcd).show_page(idle_page);
                                    ESP_LOGD("main", "API connected - page redrawn to idle");
                                } else {
                                    ESP_LOGD("main", "Local volume adjusting - stay on setting page");
                                }
                                //id(s3_box_lcd).show_page(idle_page);
                                ESP_LOGD("main", "API connected - page redrawed");
                            }
                        - delay: 2s
                        - component.update: s3_box_lcd
                      else:
                        - display.page.show: no_ha_page
                        - component.update: s3_box_lcd
                else:
                  - display.page.show: no_wifi_page
                  - component.update: s3_box_lcd
          else:
            - display.page.show: initializing_page
            - component.update: s3_box_lcd

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer) = output;    
  - id: draw_active_timer_widget
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(global_is_timer_active)){
            id(s3_box_lcd).filled_rectangle(30 , 30 , 260 , 110 , Color::WHITE );
            id(s3_box_lcd).rectangle(30 , 30 , 260 , 110 , Color::BLACK );

            id(fetch_first_active_timer).execute();
            int hours_left = floor(id(global_first_active_timer).seconds_left / 3600);
            int minutes_left = floor((id(global_first_active_timer).seconds_left - hours_left * 3600) / 60);
            int seconds_left = id(global_first_active_timer).seconds_left - hours_left * 3600 - minutes_left * 60 ;
            auto display_hours = (hours_left < 10 ? "0" : "") + std::to_string(hours_left);
            auto display_minute = (minutes_left < 10 ? "0" : "") + std::to_string(minutes_left);
            auto display_seconds = (seconds_left  < 10 ? "0" : "") + std::to_string(seconds_left) ;

            std::string display_string = "";
            if (hours_left > 0) {
              display_string = display_hours + ":" + display_minute;
            } else {
              display_string = display_minute + ":" + display_seconds;
            }
            id(s3_box_lcd).printf(160, 80, id(font_timer), amber, TextAlign::CENTER, "%s", display_string.c_str());
          }
  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  # Go to saver page, disable idel_timer_active
  - id: saver_enabled
    then:
      - display.page.show: saver_page
      - component.update: s3_box_lcd
      - lambda: |-
          //cancle timer in saver_page, save the pre saver brghtness value
          id(idle_timer_active) = false;
          id(pre_saver_brightness_value) = id(screen_brightness_value);
  # Timer script waits 60 s, then goes to saver_page if still idle
  - id: idle_page_timer
    mode: restart
    then:
      - lambda: |-
          id(idle_timer_active) = true;
      - delay: 60s
      - if:
          condition:
            lambda: 'return id(idle_timer_active);'
          then:
            - light.turn_on:
                id: led
                brightness: 40%
                transition_length: 315ms
            - script.execute: saver_enabled

  #refresh lights page
  - id: refresh_light_page
    parameters:
      entity: string
    then:
      - delay: 350ms
      - homeassistant.action:
          action: homeassistant.update_entity
          data:
            entity_id: !lambda 'return entity;'
      - display.page.show: lights_page
      - component.update: s3_box_lcd

  # Script to run gif animation
  # - id: listening_animation_script
  #   parameters:
  #     delay_ms: int
  #   then:
      # The param delay_ms is accessible using a lambda
  #     - repeat:
  #         count: 4
  #         then:
  #           - animation.next_frame: listening_animation
  #           - delay: !lambda return delay_ms;
  #           - component.update: s3_box_lcd

  - id: my_media_pause
    then:
      - homeassistant.action:
          action: media_player.media_pause
          data:
            entity_id: media_player.${external_media_player}
      - delay: 200ms
      - display.page.show: ext_media_page
      - component.update: s3_box_lcd

  - id: my_media_play
    then:
      - homeassistant.action:
          action: media_player.media_play
          data:
            entity_id: media_player.${external_media_player}
      - delay: 200ms
      - display.page.show: ext_media_page
      - component.update: s3_box_lcd

  - id: local_volume_reset_timer
    then:
      - delay: 1s
      - lambda: |-
          id(local_volume_adjusting) = false;
          ESP_LOGD("main", "Local volume adjust finished");
  # External status LED
  - id: reset_led
    then:
      - if:
          condition:
            - lambda: return id(wake_word_engine_location).state == "On device";
            - switch.is_on: use_listen_light
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 89%
                blue: 71%
                brightness: 60%
                effect: none
          else:
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state != "On device";
                  - switch.is_on: use_listen_light
                then:
                  - light.turn_on:
                      id: status_led
                      red: 0%
                      green: 100%
                      blue: 100%
                      brightness: 60%
                      effect: none
                else:
                  - light.turn_off: status_led

#end of script
switch:
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true

  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      #make sure volume is not too small for alarm.
      - speaker.volume_set:
          id: box_speaker
          volume: 80%

      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      ##play for 5 minutes.
      - delay: 5min
      - switch.turn_off: timer_ringing
  #Mute for external player - Music assitant player doesn't support this, so setting to 1%
  - platform: template
    id: ext_media_mute
    icon: 'mdi:volume-off'
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      then:
        - lambda: |-
            if (id(ha_media_volume).has_state()) {
              float vol_temp = std::stof(id(ha_media_volume).state);
              vol_temp = roundf(vol_temp * 100.0f) / 100.0f;
              id(pre_mute_volume_value) = vol_temp;
            }
        - homeassistant.action:
            action: media_player.volume_mute
            data:
              entity_id: media_player.${external_media_player_ha}
              is_volume_muted: "true"
    on_turn_off:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: media_player.${external_media_player_ha}
            volume_level: !lambda 'return id(pre_mute_volume_value);'
      - homeassistant.action:
          action: media_player.volume_mute
          data:
            entity_id: media_player.${external_media_player_ha}
            is_volume_muted: "false"
  - platform: template
    id: local_media_mute
    icon: 'mdi:volume-off'
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      then:
        - homeassistant.action:
            action: media_player.volume_set
            data:
              entity_id: media_player.speaker_media_player
              volume_level: "0"
    on_turn_off:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: media_player.speaker_media_player
            volume_level: !lambda 'return id(local_volume_value);'
  #External Status LED script
  - platform: template
    name: Use listen light
    id: use_listen_light
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: global_first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer_active
    type: bool
    restore_value: false
  - id: global_first_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer
    type: bool
    restore_value: false
  ##below added for touch
  - id: api_connection
    type: bool
    restore_value: no
    initial_value: "false"
  - id: idle_timer_active
    type: bool
    restore_value: no
    initial_value: "false"
  # Response text scroll
  - id: resp_offset
    type: int
    restore_value: no
    initial_value: '0'
  # Response text word wrap
  - id: resp_line_offset
    type: int
    restore_value: no
    initial_value: '0'

  #speaker volume
  ## External volume_value used by touch to draw volume slider
  - id: volume_value
    type: float
    restore_value: yes
  #    initial_value: '0.5'
  - id: pre_mute_volume_value
    type: float
    restore_value: no
  - id: last_touch_x
    type: int
    restore_value: no
  #    initial_value: '150'
  # used by esp32_player slider >
  - id: local_volume_value
    type: float
    restore_value: yes
    initial_value: '0.65'
  - id: local_last_touch_y
    type: int
    restore_value: no
    initial_value: '120'

  - id: local_volume_adjusting
    type: bool
    restore_value: no
    initial_value: "false"
  
  # Brightness value
  - id: screen_brightness_value
    type: float
    restore_value: yes
    initial_value: '0.85'

  - id: pre_saver_brightness_value
    type: float
    restore_value: no

  # Last touch position on brightness bar
  - id: bright_last_touch_y
    type: int
    restore_value: no
    #initial_value: '150'

  - id: bright_adjusting
    type: bool
    restore_value: no
    initial_value: "false"

